<!DOCTYPE html>

<body>
    <h1>Cadastro de Pets</h1>

    <form id="formCadastro">


        <fieldset>
            <legend>Dados do pet</legend>

            <label for="pet">Nome</label>
            <input type="text" id="pet" name="pet" autocomplete="off">
            <br>

            <label for="idade"> Idade</label>
            <input type="number" id="idade" name="idade" min="o" step="1">
        </fieldset>


        <fieldset>
            <legend>Dados do tutor</legend>
            <label for="tutor">Tutor</label>
            <input type="text" id="tutor" name="tutor" autocomplete="off">
        </fieldset>

        <button type="submit">Cadastrar</button>
        <button type="button" id="btnLimparLista">Limpar</button>

    </form>
